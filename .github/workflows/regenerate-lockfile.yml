name: Regenerate package-lock
on:
  workflow_dispatch: {}
  push:
    branches:
      - copilot/fix-ci-compat-merge

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          ref: copilot/fix-ci-compat-merge

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install package-lock only
        run: npm install --package-lock-only --no-audit --no-fund

      - name: Commit package-lock if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json || true
          if ! git diff --quiet -- package-lock.json; then
            git commit -m "chore(ci): regenerate package-lock.json (workflow)"
            git push
          else
            echo "No change to package-lock.json"
          fi
