name: 🔄 Quantum Pi Forge - Deployment Gate

on:
  push:
    branches: [ main ]
    paths:
      - '.env.launch'
      - 'scripts/verify-funding.js'
      - 'hardhat.config.ts'
      - 'contracts/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.env.launch'
      - 'scripts/verify-funding.js'
      - 'hardhat.config.ts'
      - 'contracts/**'
  workflow_dispatch:
    inputs:
      skip_funding_check:
        description: 'Skip funding verification (for testing)'
        required: false
        default: false
        type: boolean

jobs:
  verify-deployment-readiness:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Install Dependencies
      run: npm ci --legacy-peer-deps

    - name: 🔧 Setup Environment
      run: |
        # Create production environment file from secrets
        cat > .env.production << 'EOF'
        # Blockchain/Web3
        SPONSOR_PRIVATE_KEY=${{ secrets.SPONSOR_PRIVATE_KEY }}
        POLYGON_RPC_URL=https://polygon-rpc.com
        OINIO_TOKEN_ADDRESS=0x07f43E5B1A8a0928B364E40d5885f81A543B05C7
        DEPLOYER_PRIVATE_KEY=${{ secrets.DEPLOYER_PRIVATE_KEY }}
        ZERO_G_RPC_URL=https://rpc.0g.ai
        ZERO_G_CHAIN_ID=16661

        # AI/OpenAI
        OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        AI_GATEWAY_API_KEY=${{ secrets.AI_GATEWAY_API_KEY }}
        AI_GATEWAY_URL=https://ai-gateway.vercel.sh/v1

        # Next.js
        NEXT_PUBLIC_APP_URL=https://quantumpiforge.com

        # Authentication
        JWT_SECRET=${{ secrets.JWT_SECRET }}
        NEXTAUTH_URL=https://quantumpiforge.com
        NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
        GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}
        GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}
        PI_API_KEY=${{ secrets.PI_API_KEY }}

        # Database
        MONGODB_URI=${{ secrets.MONGODB_URI }}
        DATABASE_NAME=quantumpiforge_prod

        # Monitoring
        SENTRY_DSN=${{ secrets.SENTRY_DSN }}

        # Deployment
        NODE_ENV=production
        VERCEL_ENV=production
        EOF

    - name: 💰 Verify Deployer Funding
      id: funding_check
      run: |
        if [ "${{ github.event.inputs.skip_funding_check }}" = "true" ]; then
          echo "⏭️  Skipping funding verification (manual override)"
          exit 0
        fi

        echo "🔍 Running automated funding verification..."
        npm run verify-funding
      continue-on-error: true

    - name: 📣 Notify: Funding Check Failed
      if: steps.funding_check.outcome != 'success'
      env:
        WEBHOOK: ${{ secrets.DEPLOYMENT_NOTIFICATION_WEBHOOK }}
      run: |
        echo "🔔 Funding check did not succeed. Preparing notification..."
        if [ -z "${WEBHOOK}" ]; then
          echo "No DEPLOYMENT_NOTIFICATION_WEBHOOK secret set. Skipping notification."
        else
          PAYLOAD="{\"content\":\"🚨 Deployment Gate Alert: Funding verification FAILED for ${GITHUB_REPOSITORY} on ref ${GITHUB_REF}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
          curl -s -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$WEBHOOK" || true
          echo "Notification sent to webhook."
        fi
        # Fail the job to enforce the gate
        exit 1

    - name: 📊 Gas Price Intelligence
      id: gas_check
      run: |
        echo "⛽ Analyzing gas market conditions on 0G Aristotle..."

        MAX_RETRIES=5
        RETRY_DELAY=120  # 120 seconds between retries
        MAX_REASONABLE_GAS=50  # 50 gwei threshold

        for attempt in $(seq 1 $MAX_RETRIES); do
          echo "🔄 Gas check attempt $attempt/$MAX_RETRIES..."

          # Get comprehensive gas data using the enhanced script
          GAS_DATA=$(node -e "
          const { ethers } = require('ethers');
          require('dotenv').config({ path: '.env.launch' });

          async function analyzeGas() {
            try {
              const provider = new ethers.JsonRpcProvider(process.env.ZERO_G_RPC_URL);
              const [feeData, block] = await Promise.all([
                provider.getFeeData(),
                provider.getBlock('latest')
              ]);

              const baseFee = feeData.gasPrice || ethers.parseUnits('1', 'gwei');
              const maxFeePerGas = baseFee * 120n / 100n; // 20% buffer
              const estimatedGas = 5000000n;
              const estimatedCost = estimatedGas * maxFeePerGas;
              const estimatedCostA0G = ethers.formatUnits(estimatedCost, 18);

              const gasPriceGwei = parseFloat(ethers.formatUnits(baseFee, 'gwei'));
              const maxFeeGwei = parseFloat(ethers.formatUnits(maxFeePerGas, 'gwei'));

              console.log(JSON.stringify({
                baseFeeGwei: gasPriceGwei,
                maxFeeGwei: maxFeeGwei,
                estimatedCostA0G: estimatedCostA0G,
                blockNumber: block.number,
                isReasonable: maxFeeGwei <= 50
              }));
            } catch (error) {
              console.error('Gas analysis failed:', error.message);
              process.exit(1);
            }
          }
          analyzeGas();
          " 2>/dev/null)

          if [ $? -eq 0 ] && [ -n "$GAS_DATA" ]; then
            # Parse the JSON output
            BASE_FEE=$(echo $GAS_DATA | jq -r '.baseFeeGwei' 2>/dev/null || echo "0")
            MAX_FEE=$(echo $GAS_DATA | jq -r '.maxFeeGwei' 2>/dev/null || echo "0")
            ESTIMATED_COST=$(echo $GAS_DATA | jq -r '.estimatedCostA0G' 2>/dev/null || echo "0")
            IS_REASONABLE=$(echo $GAS_DATA | jq -r '.isReasonable' 2>/dev/null || echo "true")

            echo "gas_price_gwei=$BASE_FEE" >> $GITHUB_OUTPUT
            echo "max_fee_gwei=$MAX_FEE" >> $GITHUB_OUTPUT
            echo "estimated_deployment_cost_a0g=$ESTIMATED_COST" >> $GITHUB_OUTPUT
            echo "gas_reasonable=$IS_REASONABLE" >> $GITHUB_OUTPUT

            echo "📈 Base Fee: ${BASE_FEE} gwei"
            echo "🎯 Max Fee: ${MAX_FEE} gwei"
            echo "💰 Est. Cost: ${ESTIMATED_COST} A0G"

            # Check if gas is reasonable
            if [ "$IS_REASONABLE" = "true" ]; then
              echo "✅ Gas prices are reasonable"
              break
            else
              echo "⚠️  Gas prices elevated (${MAX_FEE} gwei > ${MAX_REASONABLE_GAS} gwei)"
              if [ $attempt -lt $MAX_RETRIES ]; then
                echo "⏳ Waiting ${RETRY_DELAY}s for gas market stabilization..."
                sleep $RETRY_DELAY
                continue
              else
                echo "🚨 Gas prices remain elevated after $MAX_RETRIES attempts"
                echo "gas_too_high=true" >> $GITHUB_OUTPUT
              fi
            fi
            break
          else
            echo "❌ Gas analysis failed on attempt $attempt"
            if [ $attempt -lt $MAX_RETRIES ]; then
              echo "⏳ Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            else
              echo "💥 All gas analysis attempts failed"
              exit 1
            fi
          fi
        done

    - name: 🔍 Multi-RPC Health Check
      id: rpc_health
      run: |
        echo "🌐 Testing RPC endpoint health..."

        RPC_URLS=(
          "https://evmrpc.0g.ai"
          "https://rpc.0g.ai"
          "https://rpc-backup.0g.ai"
        )

        HEALTHY_RPCS=()

        for rpc in "${RPC_URLS[@]}"; do
          echo "Testing $rpc..."
          if curl -s --max-time 5 -X POST "$rpc" \
            -H "Content-Type: application/json" \
            --data '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' | grep -q '"result"'; then
            echo "✅ $rpc is healthy"
            HEALTHY_RPCS+=("$rpc")
          else
            echo "❌ $rpc is unreachable"
          fi
        done

        echo "healthy_rpc_count=${#HEALTHY_RPCS[@]}" >> $GITHUB_OUTPUT
        echo "primary_rpc_healthy=$(if [[ " ${HEALTHY_RPCS[@]} " =~ " https://evmrpc.0g.ai " ]]; then echo 'true'; else echo 'false'; fi)" >> $GITHUB_OUTPUT

        if [ ${#HEALTHY_RPCS[@]} -eq 0 ]; then
          echo "🚨 CRITICAL: No RPC endpoints are reachable!"
          exit 1
        fi

    - name: 📋 Deployment Readiness Report
      run: |
        echo "## 🚀 Deployment Readiness Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ Checks Passed" >> $GITHUB_STEP_SUMMARY
        echo "- Funding verification: ✅ PASSED" >> $GITHUB_STEP_SUMMARY
        echo "- RPC health check: ✅ ${{ steps.rpc_health.outputs.healthy_rpc_count }} endpoints healthy" >> $GITHUB_STEP_SUMMARY
        echo "- Primary RPC status: ${{ steps.rpc_health.outputs.primary_rpc_healthy == 'true' && '✅ Healthy' || '⚠️ Degraded' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ⛽ Network Intelligence" >> $GITHUB_STEP_SUMMARY
        echo "- Base Gas Price: ${{ steps.gas_check.outputs.gas_price_gwei }} gwei" >> $GITHUB_STEP_SUMMARY
        echo "- Recommended Max Fee: ${{ steps.gas_check.outputs.max_fee_gwei }} gwei" >> $GITHUB_STEP_SUMMARY
        echo "- Est. Deployment Cost: ${{ steps.gas_check.outputs.estimated_deployment_cost_a0g }} A0G" >> $GITHUB_STEP_SUMMARY
        echo "- Gas Market Status: ${{ steps.gas_check.outputs.gas_reasonable == 'true' && '✅ Reasonable' || '⚠️ Elevated - Proceed with Caution' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🎯 Deployment Strategy" >> $GITHUB_STEP_SUMMARY
        echo "**Circuit Breaker Logic:** Multi-RPC fallback with latency-based selection" >> $GITHUB_STEP_SUMMARY
        echo "**Gas Protection:** 20% buffer over base fee with reasonableness checks" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🚀 Next Steps" >> $GITHUB_STEP_SUMMARY
        echo "All gates are GREEN! Ready for DEX deployment:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "npx hardhat run scripts/hardhat-deploy-uniswap-v2.ts --network 0g-aristotle" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

    - name: 🎉 Deployment Gate - APPROVED
      if: success() && steps.gas_check.outputs.gas_too_high != 'true'
      run: |
        echo "🎉 DEPLOYMENT GATE: APPROVED"
        echo "✅ All checks passed - ready for production deployment"
        echo ""
        echo "Next: Run deployment command or merge to trigger automated deployment"

    - name: ⚠️ Gas Price Warning - Manual Review Required
      if: steps.gas_check.outputs.gas_too_high == 'true'
      run: |
        echo "⚠️ DEPLOYMENT GATE: GAS PRICE WARNING"
        echo "🚨 Gas prices are elevated but deployment may still succeed"
        echo ""
        echo "Current gas price: ${{ steps.gas_check.outputs.max_fee_gwei }} gwei"
        echo "Threshold: 50 gwei"
        echo ""
        echo "Options:"
        echo "1. Wait for gas prices to stabilize"
        echo "2. Override and proceed (if urgent)"
        echo "3. Adjust deployment timing"
        echo ""
        echo "To override: Re-run workflow with skip_funding_check=true"

    - name: 📣 Notify: Gas Price Warning
      if: steps.gas_check.outputs.gas_too_high == 'true'
      env:
        WEBHOOK: ${{ secrets.DEPLOYMENT_NOTIFICATION_WEBHOOK }}
      run: |
        echo "🔔 Gas price warning detected. Preparing notification..."
        if [ -z "${WEBHOOK}" ]; then
          echo "No DEPLOYMENT_NOTIFICATION_WEBHOOK secret set. Skipping notification."
        else
          PAYLOAD="{\"content\":\"⚠️ Deployment Gate Alert: Gas prices elevated for ${GITHUB_REPOSITORY} on ref ${GITHUB_REF}. Estimated Max Fee: ${{ steps.gas_check.outputs.max_fee_gwei }} gwei. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
          curl -s -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$WEBHOOK" || true
          echo "Notification sent to webhook."
        fi

  # Optional: Automated deployment (uncomment when ready)
  # deploy-dex:
  #   needs: verify-deployment-readiness
  #   runs-on: ubuntu-latest
  #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  #   environment: production
  #
  #   steps:
  #   - name: 📥 Checkout Repository
  #     uses: actions/checkout@v4
  #
  #   - name: 🚀 Deploy DEX Contracts
  #     run: |
  #       npm run deploy:dex
  #     env:
  #       DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}