name: Env & Secrets Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  env-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run env validator (development)
        run: node scripts/validation/env-validator.js --env=development
        if: github.event_name == 'pull_request'

      - name: Run env validator (production)
        run: node scripts/validation/env-validator.js --env=production
        if: github.ref == 'refs/heads/main'

      - name: Validate lockfile versions
        run: node scripts/validation/validate-locks.js
        if: github.ref == 'refs/heads/main'

      - name: Check required GitHub repository secrets
        uses: actions/github-script@v7
        with:
          script: |
            const requiredSecrets = [
              'SPONSOR_PRIVATE_KEY',
              'DEPLOYER_PRIVATE_KEY',
              'POLYGON_RPC_URL',
              'MONGODB_URI',
              'NEXTAUTH_SECRET',
              'OPENAI_API_KEY',
              'VERCEL_TOKEN'
            ];
            const optionalSecrets = [
              'DEPLOYMENT_NOTIFICATION_WEBHOOK'
            ];

            const missing = [];
            for (const s of requiredSecrets) {
              try {
                await github.request('GET /repos/{owner}/{repo}/actions/secrets/{secret_name}', {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  secret_name: s
                });
              } catch (err) {
                missing.push(s);
              }
            }

            const missingOptional = [];
            for (const s of optionalSecrets) {
              try {
                await github.request('GET /repos/{owner}/{repo}/actions/secrets/{secret_name}', {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  secret_name: s
                });
              } catch (err) {
                missingOptional.push(s);
              }
            }

            if (missing.length > 0) {
              core.setFailed(`Missing required repo secrets: ${missing.join(', ')}. Set them via GitHub Settings → Secrets → Actions.`);
            } else {
              console.log('All required repository secrets present.');
              if (missingOptional.length > 0) {
                console.log(`⚠ Optional secrets missing: ${missingOptional.join(', ')}. Consider adding it to receive deployment notifications.`);
              }
            }
