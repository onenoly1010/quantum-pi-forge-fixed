name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Weekly security scan
    - cron: "0 2 * * 1"

jobs:
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Audit npm dependencies
        run: |
          npm audit --production --audit-level=high
          # Continue on warning, fail on high/critical

      - name: Audit Python dependencies
        run: |
          pip install safety
          safety check --full-report

  code-scan:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    needs: dependency-audit

    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit (Python security scanner)
        run: |
          pip install bandit
          bandit -r fastapi/ -f json -o bandit-report.json || true

      - name: Run ESLint security rules
        run: |
          npm install eslint eslint-plugin-security
          npx eslint . --ext .js,.jsx,.ts,.tsx --config .eslintrc.security.js || true

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t quantumpiforge:test .

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "quantumpiforge:test"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: "trivy-results.sarif"

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for secret scanning

      - name: Detect secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.base_ref }}
          head: ${{ github.head_ref }}
