name: 🔐 Sync Secrets to Production

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 0 * * *'  # Daily rotation

permissions:
  secrets: write
  contents: read

jobs:
  rotate-secrets:
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install Dependencies
      run: npm install libsodium-wrappers@0.7.13

    - name: 🔄 Rotate Pi API Key
      run: |
        # Generate new Pi API key
        NEW_KEY=$(openssl rand -base64 32)
        echo "PI_API_KEY_NEW=$NEW_KEY" >> $GITHUB_ENV

    - name: 🔄 Rotate JWT Secret
      run: |
        # Generate new JWT secret
        NEW_JWT=$(openssl rand -base64 64)
        echo "JWT_SECRET_NEW=$NEW_JWT" >> $GITHUB_ENV

    - name: 🔐 Update GitHub Secrets
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        node << 'EOF'
        const https = require('https');
        const sodium = require('libsodium-wrappers');
        
        async function updateSecrets() {
          await sodium.ready;
          
          const token = process.env.GITHUB_TOKEN;
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
          
          // Function to make GitHub API requests
          function githubAPI(path, method = 'GET', data = null) {
            return new Promise((resolve, reject) => {
              const options = {
                hostname: 'api.github.com',
                path: `/repos/${owner}/${repo}${path}`,
                method: method,
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'User-Agent': 'GitHub-Actions',
                  'Accept': 'application/vnd.github.v3+json',
                  'Content-Type': 'application/json'
                }
              };
              
              const req = https.request(options, (res) => {
                let body = '';
                res.on('data', chunk => body += chunk);
                res.on('end', () => {
                  if (res.statusCode >= 200 && res.statusCode < 300) {
                    resolve(JSON.parse(body));
                  } else {
                    reject(new Error(`API request failed: ${res.statusCode} ${body}`));
                  }
                });
              });
              
              req.on('error', reject);
              if (data) req.write(JSON.stringify(data));
              req.end();
            });
          }
          
          // Get the repository public key
          const publicKey = await githubAPI('/actions/secrets/public-key');
          
          // Function to encrypt secret
          function encryptSecret(secret, key) {
            const binkey = sodium.from_base64(key, sodium.base64_variants.ORIGINAL);
            const binsec = sodium.from_string(secret);
            const encBytes = sodium.crypto_box_seal(binsec, binkey);
            return sodium.to_base64(encBytes, sodium.base64_variants.ORIGINAL);
          }
          
          // Rotate Pi API Key
          if (process.env.PI_API_KEY_NEW) {
            await githubAPI('/actions/secrets/PI_API_KEY', 'PUT', {
              encrypted_value: encryptSecret(process.env.PI_API_KEY_NEW, publicKey.key),
              key_id: publicKey.key_id
            });
            console.log('✅ PI_API_KEY rotated successfully');
          }
          
          // Rotate JWT Secret
          if (process.env.JWT_SECRET_NEW) {
            await githubAPI('/actions/secrets/JWT_SECRET', 'PUT', {
              encrypted_value: encryptSecret(process.env.JWT_SECRET_NEW, publicKey.key),
              key_id: publicKey.key_id
            });
            console.log('✅ JWT_SECRET rotated successfully');
          }
        }
        
        updateSecrets().catch(err => {
          console.error('❌ Error:', err.message);
          process.exit(1);
        });
        EOF

    - name: 📧 Notify Security Team
      run: |
        echo "🔐 Secrets rotated successfully"
        echo "Next rotation: $(date -d '+24 hours' '+%Y-%m-%d %H:%M UTC')"