name: 🔐 Sync Secrets to Production

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 0 * * *'  # Daily rotation

jobs:
  rotate-secrets:
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🔄 Rotate Pi API Key
      run: |
        # Generate new Pi API key
        NEW_KEY=$(openssl rand -base64 32)
        echo "PI_API_KEY_NEW=$NEW_KEY" >> $GITHUB_ENV

    - name: 🔄 Rotate JWT Secret
      run: |
        # Generate new JWT secret
        NEW_JWT=$(openssl rand -base64 64)
        echo "JWT_SECRET_NEW=$NEW_JWT" >> $GITHUB_ENV

    - name: 🔐 Update GitHub Secrets
      uses: actions/github-script@v6
      with:
        script: |
          // Rotate Pi API Key
          if (process.env.PI_API_KEY_NEW) {
            github.rest.actions.createOrUpdateRepoSecret({
              owner: context.repo.owner,
              repo: context.repo.repo,
              secret_name: 'PI_API_KEY',
              encrypted_value: process.env.PI_API_KEY_NEW
            })
          }

          // Rotate JWT Secret
          if (process.env.JWT_SECRET_NEW) {
            github.rest.actions.createOrUpdateRepoSecret({
              owner: context.repo.owner,
              repo: context.repo.repo,
              secret_name: 'JWT_SECRET',
              encrypted_value: process.env.JWT_SECRET_NEW
            })
          }

    - name: 📧 Notify Security Team
      run: |
        echo "🔐 Secrets rotated successfully"
        echo "Next rotation: $(date -d '+24 hours' '+%Y-%m-%d %H:%M UTC')"